<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade Signals</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root {
  --bg: #0a0e17;
  --bg2: #111827;
  --bg3: #1a2235;
  --bg4: #243049;
  --border: #2a3550;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;
  --green: #22c55e;
  --green-bg: rgba(34,197,94,0.08);
  --green-glow: rgba(34,197,94,0.25);
  --red: #ef4444;
  --red-bg: rgba(239,68,68,0.08);
  --red-glow: rgba(239,68,68,0.25);
  --amber: #f59e0b;
  --amber-bg: rgba(245,158,11,0.08);
  --amber-glow: rgba(245,158,11,0.25);
  --blue: #3b82f6;
  --blue-bg: rgba(59,130,246,0.08);
  --font: 'Outfit', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
html{background:var(--bg);color:var(--text);font-family:var(--font);}
body{min-height:100vh;padding:20px 16px 60px;}

/* ── HEADER ── */
.header{max-width:1400px;margin:0 auto 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
.logo{font-size:1.6rem;font-weight:800;letter-spacing:-0.03em;background:linear-gradient(135deg,var(--green),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo span{font-weight:400;opacity:0.7;}
.header-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
.api-input{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:var(--mono);font-size:0.78rem;width:220px;outline:none;transition:border-color 0.2s;}
.api-input:focus{border-color:var(--blue);}
.api-input::placeholder{color:var(--text3);}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);flex-shrink:0;}
.status-dot.live{background:var(--green);box-shadow:0 0 8px var(--green-glow);}

/* ── WATCHLIST BAR ── */
.watchlist-bar{max-width:1400px;margin:0 auto 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.add-form{display:flex;gap:6px;}
.sym-input{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:var(--mono);font-size:0.85rem;width:110px;text-transform:uppercase;outline:none;}
.sym-input:focus{border-color:var(--blue);}
.btn{padding:8px 16px;border-radius:8px;border:none;font-family:var(--font);font-weight:600;font-size:0.82rem;cursor:pointer;transition:all 0.15s;}
.btn-add{background:var(--blue);color:#fff;}
.btn-add:hover{filter:brightness(1.15);}
.btn-sm{padding:4px 10px;font-size:0.75rem;background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
.btn-sm:hover{background:var(--bg4);color:var(--text);}
.btn-refresh{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
.btn-refresh:hover{background:var(--bg4);color:var(--text);}
.presets{display:flex;gap:6px;flex-wrap:wrap;}
.preset-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-size:0.75rem;font-weight:500;cursor:pointer;transition:all 0.15s;}
.preset-btn:hover{background:var(--bg3);color:var(--text);}

.divider{width:1px;height:24px;background:var(--border);margin:0 4px;}

/* ── GRID ── */
.grid{max-width:1400px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:16px;}

/* ── CARD ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:visible;transition:border-color 0.3s,box-shadow 0.3s;position:relative;}
.card.buy{border-color:rgba(34,197,94,0.35);box-shadow:0 0 20px rgba(34,197,94,0.06);}
.card.sell{border-color:rgba(239,68,68,0.35);box-shadow:0 0 20px rgba(239,68,68,0.06);}
.card.wait{border-color:rgba(245,158,11,0.25);}
.card-head{padding:16px 18px 12px;display:flex;align-items:flex-start;justify-content:space-between;}
.card-sym{font-family:var(--mono);font-size:1.25rem;font-weight:700;letter-spacing:0.02em;}
.card-price{font-family:var(--mono);font-size:1.1rem;font-weight:500;color:var(--text2);}
.card-change{font-size:0.82rem;font-weight:600;}
.card-change.up{color:var(--green);}
.card-change.down{color:var(--red);}
.card-remove{background:none;border:none;color:var(--text3);cursor:pointer;font-size:1rem;padding:2px 6px;border-radius:4px;}
.card-remove:hover{color:var(--red);background:var(--red-bg);}
.card-refresh{background:none;border:none;color:var(--text3);cursor:pointer;font-size:0.9rem;padding:2px 6px;border-radius:4px;transition:all 0.15s;}
.card-refresh:hover{color:var(--blue);background:var(--blue-bg);}
.card-refresh.spinning{animation:spin 0.8s linear infinite;pointer-events:none;color:var(--blue);}
.card-actions{display:flex;gap:2px;align-items:center;}
.card-move{background:none;border:none;color:var(--text3);cursor:pointer;font-size:0.75rem;padding:2px 5px;border-radius:4px;transition:all 0.15s;line-height:1;}
.card-move:hover{color:var(--text);background:var(--bg3);}
.card-move:disabled{opacity:0.2;cursor:default;pointer-events:none;}
.card-move-group{display:flex;flex-direction:column;gap:0;}

/* Drag state */
.card.dragging{opacity:0.4;transform:scale(0.97);}
.card.drag-over{border-color:var(--blue) !important;box-shadow:0 0 16px rgba(59,130,246,0.2) !important;}

/* Custom presets */
.preset-btn.custom{background:var(--bg3);border-color:rgba(59,130,246,0.3);color:var(--blue);}
.preset-btn.custom:hover{background:var(--bg4);}
.preset-delete{margin-left:4px;font-size:0.65rem;opacity:0.5;cursor:pointer;}
.preset-delete:hover{opacity:1;color:var(--red);}
.save-preset-bar{display:flex;align-items:center;gap:6px;}
.preset-name-input{background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:5px 10px;color:var(--text);font-size:0.78rem;width:130px;outline:none;font-family:var(--font);}
.preset-name-input:focus{border-color:var(--blue);}
.preset-name-input::placeholder{color:var(--text3);}

/* Signal badge */
.signal-row{padding:0 18px 14px;display:flex;align-items:center;gap:12px;}
.signal-badge{padding:6px 18px;border-radius:8px;font-weight:700;font-size:0.95rem;letter-spacing:0.05em;text-transform:uppercase;}
.signal-badge.buy{background:var(--green-bg);color:var(--green);border:1px solid rgba(34,197,94,0.25);}
.signal-badge.sell{background:var(--red-bg);color:var(--red);border:1px solid rgba(239,68,68,0.25);}
.signal-badge.wait{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(245,158,11,0.25);}
.confidence{font-family:var(--mono);font-size:0.85rem;color:var(--text2);}
.confidence strong{color:var(--text);}

/* Reasons */
.reasons{padding:0 18px 16px;display:flex;flex-direction:column;gap:6px;}
.reason{display:flex;align-items:flex-start;gap:8px;font-size:0.82rem;color:var(--text2);line-height:1.4;}
.reason-icon{flex-shrink:0;margin-top:2px;font-size:0.7rem;}
.reason-icon.bull{color:var(--green);}
.reason-icon.bear{color:var(--red);}
.reason-icon.neutral{color:var(--amber);}

/* Metrics row */
.metrics{padding:0 18px 16px;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.metric{background:var(--bg3);border-radius:8px;padding:8px 10px;position:relative;cursor:help;}
.metric-label{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);margin-bottom:2px;}
.metric-val{font-family:var(--mono);font-size:0.85rem;font-weight:600;}
.metric-val.bull{color:var(--green);}
.metric-val.bear{color:var(--red);}
.metric-val.neutral{color:var(--amber);}

/* Tooltip */
.tip{position:absolute;background:#1e293b;color:var(--text);font-size:0.72rem;padding:8px 12px;border-radius:8px;white-space:normal;width:220px;line-height:1.45;pointer-events:none;opacity:0;transition:opacity 0.2s;z-index:1000;border:1px solid var(--border);box-shadow:0 8px 24px rgba(0,0,0,0.5);font-family:var(--font);font-weight:400;}
.tip::after{content:'';position:absolute;border:6px solid transparent;}
/* Default: above */
.tip.pos-above{bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);}
.tip.pos-above::after{top:100%;left:50%;transform:translateX(-50%);border-top-color:#1e293b;}
/* Below */
.tip.pos-below{top:calc(100% + 8px);left:50%;transform:translateX(-50%);}
.tip.pos-below::after{bottom:100%;left:50%;transform:translateX(-50%);border-bottom-color:#1e293b;}
/* Left-align when near right edge */
.tip.align-left{left:0;transform:none;}
.tip.align-left::after{left:16px;transform:none;}
/* Right-align when near left edge */
.tip.align-right{left:auto;right:0;transform:none;}
.tip.align-right::after{left:auto;right:16px;transform:none;}
.metric:hover .tip{opacity:1;}

/* Sector ref */
.sector-ref{padding:0 18px 14px;font-size:0.75rem;color:var(--text3);display:flex;align-items:center;gap:6px;}
.sector-ref .dot{width:6px;height:6px;border-radius:50%;}
.sector-ref .dot.up{background:var(--green);}
.sector-ref .dot.down{background:var(--red);}

/* Blocker bar */
.blocker{margin:0 18px 14px;padding:10px 14px;background:var(--amber-bg);border:1px solid rgba(245,158,11,0.2);border-radius:8px;font-size:0.78rem;color:var(--amber);display:flex;align-items:flex-start;gap:8px;line-height:1.4;}
.blocker-icon{font-size:0.9rem;flex-shrink:0;}

/* Loading */
.card-loading{padding:30px 18px;display:flex;flex-direction:column;align-items:center;gap:12px;color:var(--text3);font-size:0.85rem;}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.card-error{padding:20px 18px;color:var(--red);font-size:0.82rem;text-align:center;}

/* Timestamp */
.timestamp{padding:0 18px 14px;font-size:0.68rem;color:var(--text3);font-family:var(--mono);}

/* Symbol Info Bar */
.sym-info{padding:0 18px 12px;}
.sym-info-name{font-size:0.8rem;color:var(--text2);font-weight:500;margin-bottom:4px;}
.sym-info-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px;}
.sym-tag{font-size:0.65rem;padding:2px 8px;border-radius:4px;font-weight:600;letter-spacing:0.03em;text-transform:uppercase;font-family:var(--mono);}
.sym-tag.letf{background:rgba(59,130,246,0.12);color:var(--blue);border:1px solid rgba(59,130,246,0.2);}
.sym-tag.ietf{background:var(--red-bg);color:var(--red);border:1px solid rgba(239,68,68,0.2);}
.sym-tag.etf{background:rgba(139,92,246,0.1);color:#a78bfa;border:1px solid rgba(139,92,246,0.2);}
.sym-tag.stock{background:rgba(34,197,94,0.08);color:var(--green);border:1px solid rgba(34,197,94,0.2);}
.sym-tag.sector{background:rgba(245,158,11,0.08);color:var(--amber);border:1px solid rgba(245,158,11,0.2);}
.sym-tag.leverage{background:rgba(236,72,153,0.1);color:#f472b6;border:1px solid rgba(236,72,153,0.2);}
.sym-tag.direction-bull{background:rgba(34,197,94,0.08);color:var(--green);border:1px solid rgba(34,197,94,0.2);}
.sym-tag.direction-bear{background:var(--red-bg);color:var(--red);border:1px solid rgba(239,68,68,0.2);}
.sym-info-desc{font-size:0.73rem;color:var(--text3);line-height:1.45;}
.sym-info-underlying{margin-top:5px;font-size:0.72rem;color:var(--text3);display:flex;align-items:center;gap:5px;}
.sym-info-underlying strong{color:var(--text2);}

/* Responsive */
@media(max-width:480px){
  .grid{grid-template-columns:1fr;}
  .header{flex-direction:column;align-items:flex-start;}
  .header-right{margin-left:0;width:100%;}
  .api-input{width:100%;}
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">TradeSignals <span>/ live</span></div>
  <div class="header-right">
    <div class="status-dot" id="statusDot" title="Connection status"></div>
    <input type="password" class="api-input" id="apiKey" placeholder="Finnhub API key" autocomplete="off">
  </div>
</div>

<div class="watchlist-bar">
  <div class="add-form">
    <input type="text" class="sym-input" id="symInput" placeholder="AAPL" maxlength="10">
    <button class="btn btn-add" onclick="addSymbol()">Add</button>
    <button class="btn btn-refresh" onclick="refreshAll()">↻ Refresh All</button>
    <button class="btn btn-sm" onclick="clearAll()" style="color:var(--red);">Clear All</button>
  </div>
  <div class="divider"></div>
  <div class="presets">
    <button class="preset-btn" onclick="loadPreset('leveraged')">Leveraged ETFs</button>
    <button class="preset-btn" onclick="loadPreset('inverse')">Inverse ETFs</button>
    <button class="preset-btn" onclick="loadPreset('pairs')">Bull/Bear Pairs</button>
    <button class="preset-btn" onclick="loadPreset('tech')">Big Tech</button>
    <button class="preset-btn" onclick="loadPreset('semis')">Semiconductors</button>
    <button class="preset-btn" onclick="loadPreset('sector')">Sector ETFs</button>
    <button class="preset-btn" onclick="loadPreset('crypto')">Crypto</button>
    <button class="preset-btn" onclick="loadPreset('defense')">Defense</button>
    <button class="preset-btn" onclick="loadPreset('energy')">Energy</button>
    <button class="preset-btn" onclick="loadPreset('gold')">Gold</button>
    <span id="customPresets"></span>
  </div>
  <div class="divider"></div>
  <div class="save-preset-bar">
    <input type="text" class="preset-name-input" id="presetNameInput" placeholder="Preset name" maxlength="20">
    <button class="btn btn-sm" onclick="saveCustomPreset()">Save List</button>
  </div>
</div>

<div class="grid" id="grid"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════
const PRESETS = {

// ═══════════════════════════════════════════════════════════════

// type: stock | etf | letf (leveraged ETF) | ietf (inverse ETF)

// CORS PROXY CHAIN for Yahoo Finance
// Uses both query1 and query2 Yahoo domains, races multiple proxies
// ═══════════════════════════════════════════════════════════════
const CORS_PROXIES = [
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
  url => `https://api.cors.lol/?url=${encodeURIComponent(url)}`,
  url => `https://proxy.corsfix.com/?${encodeURIComponent(url)}`,
  url => `https://cors-proxy.htmldriven.com/?url=${encodeURIComponent(url)}`,
  url => `https://thingproxy.freeboard.io/fetch/${url}`,
];
let lastWorkingProxy = -1;

async function yahooFetch(url) {
  // Try both Yahoo domains
  const url2 = url.replace('query1.finance.yahoo.com', 'query2.finance.yahoo.com');
  const urls = [url, url2];

  // If we have a known working proxy, try it first on both domains (fast path)
  if (lastWorkingProxy >= 0) {
    for (const u of urls) {
      try {
        const r = await tryProxy(lastWorkingProxy, u);
        if (r) return r;
      } catch(e) {}
    }
    // Last working proxy failed, reset it
    lastWorkingProxy = -1;
  }

  // Race all proxies on both domains simultaneously
  // Build array of all attempts: [proxy0+url1, proxy0+url2, proxy1+url1, ...]
  const attempts = [];
  for (let pi = 0; pi < CORS_PROXIES.length; pi++) {
    for (const u of urls) {
      attempts.push({ pi, url: u });
    }
  }
  // Also try direct fetch (will fail from file:// or most origins, but cheap to try)
  for (const u of urls) {
    attempts.push({ pi: -1, url: u });
  }

  try {
    return await new Promise((resolve, reject) => {
      let settled = false;
      let failures = 0;
      const total = attempts.length;

      attempts.forEach(({ pi, url: u }) => {
        tryProxy(pi, u)
          .then(result => {
            if (result && !settled) {
              settled = true;
              if (pi >= 0) lastWorkingProxy = pi;
              resolve(result);
            } else {
              failures++;
              if (failures >= total && !settled) { settled = true; reject(new Error('All proxies failed')); }
            }
          })
          .catch(() => {
            failures++;
            if (failures >= total && !settled) { settled = true; reject(new Error('All proxies failed')); }
          });
      });

      // Global timeout
      setTimeout(() => {
        if (!settled) { settled = true; reject(new Error('Timeout')); }
      }, 15000);
    });
  } catch(e) {
    console.warn('yahooFetch: all attempts failed for', url, e.message);
    return null;
  }
}

async function tryProxy(pi, url) {
  const fetchUrl = pi === -1 ? url : CORS_PROXIES[pi](url);
  const r = await fetch(fetchUrl, { signal: AbortSignal.timeout(10000) });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const text = await r.text();
  // Some proxies wrap response in JSON (allorigins /get endpoint, htmldriven, etc.)
  let data = text;
  if (!data.trim().startsWith('{')) {
    // Try to parse as wrapper JSON with .contents field
    try {
      const wrapper = JSON.parse(data);
      if (wrapper.contents) data = wrapper.contents;
      else throw new Error('not a wrapper');
    } catch(e) {
      throw new Error('Non-JSON response');
    }
  }
  const json = JSON.parse(data);
  const result = json?.chart?.result?.[0];
  if (!result || !result.timestamp) throw new Error('No chart data');
  return result;
}

// ═══════════════════════════════════════════════════════════════
// DATA CACHE — avoids redundant API calls for recently-fetched data
// ═══════════════════════════════════════════════════════════════
const dataCache = new Map(); // key → { data, ts }
const CACHE_TTL = {
  finnhub: 60 * 1000,     // 1 min  — live quotes change fast
  intraday: 2 * 60 * 1000, // 2 min  — 30m candles, moderate refresh
  daily: 10 * 60 * 1000,   // 10 min — daily bars barely change intraday
};

function cacheGet(key, ttl) {
  const entry = dataCache.get(key);
  if (!entry) return null;
  if (Date.now() - entry.ts > ttl) { dataCache.delete(key); return null; }
  return entry.data;
}

function cacheSet(key, data) {
  dataCache.set(key, { data, ts: Date.now() });
}

// Get intraday 30m candles from Yahoo (2 days)
async function getIntraday(sym) {
  const key = `intraday:${sym}`;
  const cached = cacheGet(key, CACHE_TTL.intraday);
  if (cached) return cached;
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?range=2d&interval=30m&includePrePost=false`;
  const data = await yahooFetch(url);
  if (data) cacheSet(key, data);
  return data;
}

// Get daily candles from Yahoo (3 months for moving averages)
async function getDaily(sym) {
  const key = `daily:${sym}`;
  const cached = cacheGet(key, CACHE_TTL.daily);
  if (cached) return cached;
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?range=3mo&interval=1d&includePrePost=false`;
  const data = await yahooFetch(url);
  if (data) cacheSet(key, data);
  return data;
}

// Get Finnhub quote
async function getFinnhubQuote(sym) {
  if (!finnhubKey) return null;
  const key = `fhquote:${sym}`;
  const cached = cacheGet(key, CACHE_TTL.finnhub);
  if (cached) return cached;
  try {
    const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(sym)}&token=${finnhubKey}`, { signal: AbortSignal.timeout(6000) });
    if (!r.ok) return null;
    const data = await r.json();
    if (data) cacheSet(key, data);
    return data;
  } catch(e) { return null; }
}

// ═══════════════════════════════════════════════════════════════
// TECHNICAL CALCULATIONS
// ═══════════════════════════════════════════════════════════════

function calcEMA(data, period) {
  if (data.length < period) return [];
  const k = 2 / (period + 1);
  let ema = [data.slice(0, period).reduce((a, b) => a + b, 0) / period];
  for (let i = period; i < data.length; i++) {
    ema.push(data[i] * k + ema[ema.length - 1] * (1 - k));
  }
  return ema;
}

function calcSMA(data, period) {
  const result = [];
  for (let i = period - 1; i < data.length; i++) {
    result.push(data.slice(i - period + 1, i + 1).reduce((a, b) => a + b, 0) / period);
  }
  return result;
}

function calcRSI(closes, period = 14) {
  if (closes.length < period + 1) return null;
  let gains = 0, losses = 0;
  for (let i = 1; i <= period; i++) {
    const diff = closes[i] - closes[i - 1];
    if (diff > 0) gains += diff; else losses -= diff;
  }
  let avgGain = gains / period;
  let avgLoss = losses / period;
  for (let i = period + 1; i < closes.length; i++) {
    const diff = closes[i] - closes[i - 1];
    avgGain = (avgGain * (period - 1) + Math.max(diff, 0)) / period;
    avgLoss = (avgLoss * (period - 1) + Math.max(-diff, 0)) / period;
  }
  if (avgLoss === 0) return 100;
  const rs = avgGain / avgLoss;
  return 100 - (100 / (1 + rs));
}

function calcMACD(closes) {
  const ema12 = calcEMA(closes, 12);
  const ema26 = calcEMA(closes, 26);
  if (ema12.length === 0 || ema26.length === 0) return { line: 0, signal: 0, histogram: 0, prevHistogram: 0, histRising: false };
  const offset = ema12.length - ema26.length;
  const macdLine = [];
  for (let i = 0; i < ema26.length; i++) {
    macdLine.push(ema12[i + offset] - ema26[i]);
  }
  const signalLine = calcEMA(macdLine, 9);
  if (signalLine.length === 0) return { line: macdLine[macdLine.length-1]||0, signal: 0, histogram: 0, prevHistogram: 0, histRising: false };
  const ml = macdLine[macdLine.length - 1];
  const sl = signalLine[signalLine.length - 1];
  const prevMl = macdLine.length > 1 ? macdLine[macdLine.length - 2] : ml;
  const prevSl = signalLine.length > 1 ? signalLine[signalLine.length - 2] : sl;
  const hist = ml - sl;
  const prevHist = prevMl - prevSl;
  return { line: ml, signal: sl, histogram: hist, prevHistogram: prevHist, histRising: Math.abs(hist) > Math.abs(prevHist) && Math.sign(hist) === Math.sign(prevHist) };
}

function calcVWAP(timestamps, highs, lows, closes, volumes) {
  let cumTPV = 0, cumVol = 0;
  let lastDay = -1;
  const vwaps = [];
  for (let i = 0; i < timestamps.length; i++) {
    const d = new Date(timestamps[i] * 1000);
    const day = d.getUTCDay() * 1000 + d.getUTCDate();
    if (day !== lastDay) { cumTPV = 0; cumVol = 0; lastDay = day; }
    const tp = (highs[i] + lows[i] + closes[i]) / 3;
    cumTPV += tp * volumes[i];
    cumVol += volumes[i];
    vwaps.push(cumVol > 0 ? cumTPV / cumVol : closes[i]);
  }
  return vwaps;
}

function calcATR(highs, lows, closes, period = 14) {
  if (highs.length < period + 1) return null;
  let atr = 0;
  for (let i = 1; i <= period; i++) {
    const tr = Math.max(highs[i] - lows[i], Math.abs(highs[i] - closes[i-1]), Math.abs(lows[i] - closes[i-1]));
    atr += tr;
  }
  atr /= period;
  for (let i = period + 1; i < highs.length; i++) {
    const tr = Math.max(highs[i] - lows[i], Math.abs(highs[i] - closes[i-1]), Math.abs(lows[i] - closes[i-1]));
    atr = (atr * (period - 1) + tr) / period;
  }
  return atr;
}

// SIGNAL ENGINE v2 — Tuned for anti-chase, day/swing trades
//
// 8 signals, no redundancy. Each answers a distinct question:
//   1. Volume + volume trend (22) → Is this move real & still building?
//   2. VWAP position (18) → Am I chasing an extension?
//   3. Sector confirmation (16) → Does the broader market agree?
//   4. MACD momentum direction (14) → Is the engine accelerating or dying?
//   5. ATR remaining (12) → Is there room left to run today?
//   6. RSI dual timeframe (10) → Am I too late on any timeframe?
//   7. Trend alignment (10) → Is the overall direction confirmed?
//   8. Previous day levels (8) → Has a key structural level broken?

async function analyzeSymbol(sym) {
  const [intraday, daily, fhQuote] = await Promise.all([
    getIntraday(sym),
    getDaily(sym),
    getFinnhubQuote(sym)
  ]);

  if (!daily || !daily.timestamp || daily.timestamp.length < 21) {
    throw new Error('Not enough data — check the symbol');
  }

  const dq = daily.indicators.quote[0];
  const dCloses = dq.close.filter(v => v != null);
  const dHighs = dq.high.filter(v => v != null);
  const dLows = dq.low.filter(v => v != null);
  const dVolumes = dq.volume.filter(v => v != null);

  // Current price
  let price = fhQuote?.c || dCloses[dCloses.length - 1];
  let prevClose = fhQuote?.pc || dCloses[dCloses.length - 2];
  let dayChange = price - prevClose;
  let dayChangePct = (dayChange / prevClose) * 100;
  let dayHigh = fhQuote?.h || dHighs[dHighs.length - 1];
  let dayLow = fhQuote?.l || dLows[dLows.length - 1];

  // ── Calculate everything ──
  const ema9 = calcEMA(dCloses, 9);
  const ema21 = calcEMA(dCloses, 21);
  const sma20 = calcSMA(dCloses, 20);
  const dailyRsi = calcRSI(dCloses, 14);
  const macd = calcMACD(dCloses);
  const atr = calcATR(dHighs, dLows, dCloses, 14);

  const curEma9 = ema9[ema9.length - 1];
  const curEma21 = ema21[ema21.length - 1];
  const curSma20 = sma20[sma20.length - 1];
  const prevEma9 = ema9.length > 1 ? ema9[ema9.length - 2] : curEma9;
  const prevEma21 = ema21.length > 1 ? ema21[ema21.length - 2] : curEma21;

  const prevDayHigh = dHighs[dHighs.length - 2];
  const prevDayLow = dLows[dLows.length - 2];

  // Volume: 20-day average
  const recentVols = dVolumes.slice(-21, -1);
  const avgVol = recentVols.reduce((a, b) => a + b, 0) / recentVols.length;
  const todayVol = dVolumes[dVolumes.length - 1];
  const relVol = todayVol / avgVol;

  // Today's range vs ATR
  const todayRange = dayHigh - dayLow;
  const atrRemaining = atr ? Math.max(0, 1 - (todayRange / atr)) : null;
  const atrUsedPct = atr ? (todayRange / atr) * 100 : null;

  // Intraday data: VWAP, volume trend, 30m RSI
  let vwap = null, priceVsVwap = 0, volTrend = null, intradayRsi = null;
  if (intraday && intraday.timestamp && intraday.timestamp.length > 4) {
    const iq = intraday.indicators.quote[0];
    const iTs = intraday.timestamp;
    const iH = iq.high, iL = iq.low, iC = iq.close, iV = iq.volume;

    // VWAP
    const vwaps = calcVWAP(iTs, iH, iL, iC, iV);
    vwap = vwaps[vwaps.length - 1];
    priceVsVwap = ((price - vwap) / vwap) * 100;

    // Volume trend: compare last 3 bars' average volume to the 3 before that
    const cleanVols = iV.filter(v => v != null && v > 0);
    if (cleanVols.length >= 6) {
      const recent3 = cleanVols.slice(-3).reduce((a,b) => a+b, 0) / 3;
      const prior3 = cleanVols.slice(-6, -3).reduce((a,b) => a+b, 0) / 3;
      volTrend = prior3 > 0 ? (recent3 / prior3) : null;
    }

    // 30-minute RSI
    const cleanCloses = iC.filter(v => v != null);
    if (cleanCloses.length > 14) {
      intradayRsi = calcRSI(cleanCloses, 14);
    }
  }

  // ── SCORING ──
  const signals = [];
  let totalScore = 0;
  const W = { volume: 22, vwap: 18, sector: 16, macd: 14, atr: 12, rsi: 10, trend: 10, prevDay: 8 };
  const maxPossible = Object.values(W).reduce((a, b) => a + b, 0); // 110

  // ────────────────────────────────────────
  // 1. VOLUME + VOLUME TREND (22)
  // Two-part: is overall volume strong, and is it building or fading?
  // ────────────────────────────────────────
  let volScore = 0;

  // Part A: Relative volume (0 to ~13)
  if (relVol >= 1.5) {
    volScore += W.volume * 0.6;
    signals.push({ text: `Volume ${relVol.toFixed(1)}x average — strong participation`, type: dayChange >= 0 ? 'bull' : 'bear' });
  } else if (relVol >= 1.0) {
    volScore += W.volume * 0.25;
  } else if (relVol < 0.6) {
    volScore -= W.volume * 0.3;
    signals.push({ text: `Volume only ${relVol.toFixed(1)}x average — nobody's trading this`, type: 'neutral' });
  }

  // Part B: Volume trend — is money still coming in or drying up? (0 to ~9)
  if (volTrend != null) {
    if (volTrend > 1.2) {
      volScore += W.volume * 0.4;
      signals.push({ text: `Volume building — last 3 bars ${volTrend.toFixed(1)}x the prior 3`, type: dayChange >= 0 ? 'bull' : 'bear' });
    } else if (volTrend < 0.6) {
      volScore -= W.volume * 0.4;
      signals.push({ text: `Volume fading — buyers/sellers drying up (${volTrend.toFixed(1)}x prior bars)`, type: 'neutral' });
    }
  }

  // Volume confirms the direction of the existing move
  if (dayChange >= 0) totalScore += volScore;
  else totalScore -= Math.abs(volScore);

  // ────────────────────────────────────────
  // 2. VWAP POSITION (18)
  // Steeper extension penalty to prevent chasing
  // ────────────────────────────────────────
  if (vwap != null) {
    const absExt = Math.abs(priceVsVwap);

    if (absExt < 0.1) {
      signals.push({ text: 'Sitting right at VWAP — no directional edge yet', type: 'neutral' });
    } else if (priceVsVwap > 0) {
      // Bullish side
      if (absExt <= 0.7) {
        totalScore += W.vwap;
        signals.push({ text: `Above VWAP by ${priceVsVwap.toFixed(2)}% — healthy buyers' zone`, type: 'bull' });
      } else if (absExt <= 1.2) {
        totalScore += W.vwap * 0.3;
        signals.push({ text: `Extended above VWAP (${priceVsVwap.toFixed(2)}%) — getting stretched`, type: 'neutral' });
      } else {
        totalScore -= W.vwap * 0.5;
        signals.push({ text: `Way above VWAP (${priceVsVwap.toFixed(2)}%) — chase territory, don't enter long here`, type: 'bear' });
      }
    } else {
      // Bearish side
      if (absExt <= 0.7) {
        totalScore -= W.vwap;
        signals.push({ text: `Below VWAP by ${absExt.toFixed(2)}% — sellers in control`, type: 'bear' });
      } else if (absExt <= 1.2) {
        totalScore -= W.vwap * 0.3;
        signals.push({ text: `Extended below VWAP (${absExt.toFixed(2)}%) — getting stretched`, type: 'neutral' });
      } else {
        totalScore += W.vwap * 0.5;
        signals.push({ text: `Way below VWAP (${absExt.toFixed(2)}%) — chase territory, don't enter short here`, type: 'bull' });
      }
    }
  }

  // ────────────────────────────────────────
  // 3. SECTOR CONFIRMATION (16) — scored inside analyzeAndRender
  //    (needs async sector data, applied after this function returns)
  // ────────────────────────────────────────

  // ────────────────────────────────────────
  // 4. MACD MOMENTUM DIRECTION (14)
  // Not just positive/negative — is the histogram growing or shrinking?
  // ────────────────────────────────────────
  const hist = macd.histogram;
  const prevHist = macd.prevHistogram;
  const histGrowing = macd.histRising;

  if (hist > 0 && prevHist <= 0) {
    // Fresh flip positive
    totalScore += W.macd;
    signals.push({ text: 'MACD just flipped bullish — fresh momentum starting', type: 'bull' });
  } else if (hist < 0 && prevHist >= 0) {
    // Fresh flip negative
    totalScore -= W.macd;
    signals.push({ text: 'MACD just flipped bearish — momentum reversing', type: 'bear' });
  } else if (hist > 0 && histGrowing) {
    totalScore += W.macd * 0.7;
    signals.push({ text: 'MACD positive and accelerating — momentum building', type: 'bull' });
  } else if (hist > 0 && !histGrowing) {
    totalScore += W.macd * 0.1;
    signals.push({ text: 'MACD positive but shrinking — momentum fading even though price is up', type: 'neutral' });
  } else if (hist < 0 && histGrowing) {
    totalScore -= W.macd * 0.7;
    signals.push({ text: 'MACD negative and accelerating down — selling intensifying', type: 'bear' });
  } else if (hist < 0 && !histGrowing) {
    totalScore -= W.macd * 0.1;
    signals.push({ text: 'MACD negative but improving — selling pressure easing', type: 'neutral' });
  }

  // ────────────────────────────────────────
  // 5. ATR REMAINING (12)
  // How much of the typical daily range has been used up?
  // ────────────────────────────────────────
  if (atrUsedPct != null) {
    if (atrUsedPct < 40) {
      totalScore += W.atr * 0.7 * (totalScore > 0 ? 1 : -1);
      signals.push({ text: `Only ${atrUsedPct.toFixed(0)}% of typical daily range used — plenty of room to move`, type: totalScore > 0 ? 'bull' : 'bear' });
    } else if (atrUsedPct < 70) {
      totalScore += W.atr * 0.3 * (totalScore > 0 ? 1 : -1);
    } else if (atrUsedPct < 90) {
      signals.push({ text: `${atrUsedPct.toFixed(0)}% of daily range used up — move is mostly done`, type: 'neutral' });
    } else {
      totalScore *= 0.7;
      signals.push({ text: `${atrUsedPct.toFixed(0)}% of daily range consumed — statistically running on fumes`, type: 'neutral' });
    }
  }

  // ────────────────────────────────────────
  // 6. RSI DUAL TIMEFRAME (10)
  // Daily for context, 30m for right-now exhaustion
  // ────────────────────────────────────────
  let rsiScore = 0;
  const bestRsi = intradayRsi || dailyRsi; // prefer intraday

  // Daily RSI — context
  if (dailyRsi != null) {
    if (dailyRsi >= 70) {
      rsiScore -= W.rsi * 0.5;
      signals.push({ text: `Daily momentum overheated (RSI ${dailyRsi.toFixed(0)}) — pullback risk`, type: 'bear' });
    } else if (dailyRsi >= 60) {
      rsiScore += W.rsi * 0.2;
    } else if (dailyRsi <= 30) {
      rsiScore += W.rsi * 0.3;
      signals.push({ text: `Daily momentum washed out (RSI ${dailyRsi.toFixed(0)}) — bounce zone`, type: 'bull' });
    } else if (dailyRsi <= 40) {
      rsiScore -= W.rsi * 0.3;
    }
  }

  // Intraday RSI — timing
  if (intradayRsi != null) {
    if (intradayRsi >= 75) {
      rsiScore -= W.rsi * 0.5;
      signals.push({ text: `30-min momentum maxed out (RSI ${intradayRsi.toFixed(0)}) — don't enter now`, type: 'bear' });
    } else if (intradayRsi >= 65) {
      rsiScore -= W.rsi * 0.2;
      signals.push({ text: `30-min momentum getting hot (RSI ${intradayRsi.toFixed(0)}) — late for entries`, type: 'neutral' });
    } else if (intradayRsi <= 30) {
      rsiScore += W.rsi * 0.4;
      signals.push({ text: `30-min momentum oversold (RSI ${intradayRsi.toFixed(0)}) — bounce setup`, type: 'bull' });
    } else if (intradayRsi >= 40 && intradayRsi <= 58) {
      rsiScore += W.rsi * 0.3;
      if (dailyRsi != null && dailyRsi >= 40 && dailyRsi <= 60) {
        signals.push({ text: `Both timeframes in sweet spot (daily ${dailyRsi.toFixed(0)}, 30m ${intradayRsi.toFixed(0)}) — good entry timing`, type: 'bull' });
      }
    }
  } else if (dailyRsi != null && dailyRsi >= 40 && dailyRsi <= 60) {
    rsiScore += W.rsi * 0.3;
    signals.push({ text: `Daily momentum in entry zone (RSI ${dailyRsi.toFixed(0)})`, type: 'bull' });
  }

  totalScore += rsiScore;

  // ────────────────────────────────────────
  // 7. TREND ALIGNMENT (10)
  // Single consolidated read: EMA 9 vs 21 direction + price vs SMA 20
  // ────────────────────────────────────────
  const ema9Rising = curEma9 > prevEma9;
  const ema21Rising = curEma21 > prevEma21;
  const aboveSma20 = price > curSma20;
  const ema9Above21 = curEma9 > curEma21;

  let trendBull = 0;
  if (ema9Rising) trendBull++;
  if (ema21Rising) trendBull++;
  if (aboveSma20) trendBull++;
  if (ema9Above21) trendBull++;

  if (trendBull >= 4) {
    totalScore += W.trend;
    signals.push({ text: 'Fully confirmed uptrend — fast & slow moving averages rising, price above all', type: 'bull' });
  } else if (trendBull === 3) {
    totalScore += W.trend * 0.5;
    signals.push({ text: 'Mostly bullish trend — one minor disagreement', type: 'bull' });
  } else if (trendBull <= 0) {
    totalScore -= W.trend;
    signals.push({ text: 'Fully confirmed downtrend — all moving averages bearish', type: 'bear' });
  } else if (trendBull === 1) {
    totalScore -= W.trend * 0.5;
    signals.push({ text: 'Mostly bearish trend — one minor bright spot', type: 'bear' });
  } else {
    signals.push({ text: 'Trend is mixed — no clear direction from moving averages', type: 'neutral' });
  }

  // ────────────────────────────────────────
  // 8. PREVIOUS DAY LEVELS (8)
  // ────────────────────────────────────────
  if (price > prevDayHigh) {
    totalScore += W.prevDay;
    signals.push({ text: `Broke above yesterday's high ($${prevDayHigh.toFixed(2)}) — structural breakout`, type: 'bull' });
  } else if (price < prevDayLow) {
    totalScore -= W.prevDay;
    signals.push({ text: `Broke below yesterday's low ($${prevDayLow.toFixed(2)}) — structural breakdown`, type: 'bear' });
  }

  // ════════════════════════════════════════
  // GUARDRAILS — hard blocks for bad entries
  // ════════════════════════════════════════
  let blockers = [];

  // Dead zone: low range + low volume
  if (atrUsedPct != null && atrUsedPct < 30 && relVol < 0.7) {
    blockers.push('Dead zone — tiny range on light volume. Nothing to trade here.');
    totalScore *= 0.3;
  }

  // Exhaustion spike: overbought RSI + far from VWAP + range mostly consumed
  if ((bestRsi && bestRsi > 75) && Math.abs(priceVsVwap) > 1.0 && atrUsedPct > 80) {
    blockers.push('Exhaustion spike — momentum maxed, price stretched, range used up. This is where reversals happen.');
    totalScore *= 0.2;
  }

  // Chase trap: volume fading + extended from VWAP (the exact pattern that burns you)
  if (volTrend != null && volTrend < 0.65 && Math.abs(priceVsVwap) > 0.7) {
    blockers.push('Volume drying up while price is extended from VWAP. The move is over — entering now is chasing.');
    totalScore *= 0.3;
  }

  // Range exhaustion: already used 90%+ of daily range
  if (atrUsedPct != null && atrUsedPct > 90 && Math.abs(totalScore) > 15) {
    blockers.push(`Today's range is ${atrUsedPct.toFixed(0)}% consumed. Even if direction is right, there's no room left.`);
    totalScore *= 0.4;
  }

  // Low conviction: no clear direction + weak volume
  if (Math.abs(totalScore) < 12 && relVol < 0.7) {
    blockers.push('No clear direction with weak volume. Stay out.');
  }

  // ── FINAL SIGNAL ──
  const normalizedScore = (totalScore / maxPossible) * 100;
  let signal, confidence;

  if (normalizedScore > 18 && blockers.length === 0) {
    signal = 'BUY';
    confidence = Math.min(95, Math.round(30 + normalizedScore * 0.65));
  } else if (normalizedScore < -18 && blockers.length === 0) {
    signal = 'SELL';
    confidence = Math.min(95, Math.round(30 + Math.abs(normalizedScore) * 0.65));
  } else {
    signal = 'WAIT';
    confidence = Math.round(40 + Math.abs(normalizedScore) * 0.3);
  }

  const isInverse = IS_INVERSE.has(sym);

  return {
    sym, price, dayChange, dayChangePct, dayHigh, dayLow,
    signal, confidence, signals, blockers, isInverse,
    totalScore, maxPossible, normalizedScore,
    metrics: {
      vwap, priceVsVwap,
      relVol, volTrend,
      dailyRsi, intradayRsi,
      macdHist: macd.histogram, macdHistRising: histGrowing,
      atrUsedPct, atr, todayRange,
      trendBull, ema9: curEma9, ema21: curEma21, sma20: curSma20,
      prevDayHigh, prevDayLow
    }
  };
}

// Get sector/index confirmation
async function getSectorSignal(sym) {
  const ref = SECTOR_MAP[sym];
  if (!ref || ref === sym) return null;
  try {
    const fq = await getFinnhubQuote(ref);
    if (!fq) return null;
    const change = ((fq.c - fq.pc) / fq.pc) * 100;
    return { sym: ref, price: fq.c, change };
  } catch(e) { return null; }
}

// ═══════════════════════════════════════════════════════════════
// UI RENDERING
// ═══════════════════════════════════════════════════════════════

function renderCard(data, sectorData) {
  const { sym, price, dayChange, dayChangePct, signal, confidence, signals, blockers, metrics, isInverse } = data;
  const sig = signal.toLowerCase();
  const changeClass = dayChange >= 0 ? 'up' : 'down';
  const changeSign = dayChange >= 0 ? '+' : '';

  // Pick top reasons (strongest signals only)
  const topReasons = signals
    .filter(s => s.type !== 'neutral')
    .slice(0, 5);
  const neutralReasons = signals.filter(s => s.type === 'neutral').slice(0, 2);

  // Display signal — for inverse ETFs, note the relationship
  let signalLabel = signal;
  let signalNote = '';
  if (isInverse && signal === 'BUY') {
    signalNote = '(Bearish setup — this is an inverse ETF)';
  } else if (isInverse && signal === 'SELL') {
    signalNote = '(Bullish setup — inverse ETF goes down)';
  }

  let html = `
    <div class="card ${sig}" id="card-${sym}" draggable="true">
      <div class="card-head">
        <div>
          <div class="card-sym">${sym}</div>
          <div class="card-price">$${price.toFixed(2)} <span class="card-change ${changeClass}">${changeSign}${dayChange.toFixed(2)} (${changeSign}${dayChangePct.toFixed(2)}%)</span></div>
        </div>
        <div class="card-actions">
          <div class="card-move-group">
            <button class="card-move" onclick="moveSymbol('${sym}',-1)" title="Move up">▲</button>
            <button class="card-move" onclick="moveSymbol('${sym}',1)" title="Move down">▼</button>
          </div>
          <button class="card-refresh" onclick="refreshSymbol('${sym}',this)" title="Refresh">↻</button>
          <button class="card-remove" onclick="removeSymbol('${sym}')" title="Remove">✕</button>
        </div>
      </div>`;

  // Symbol info section
  const info = SYMBOL_INFO[sym];
  if (info) {
    const typeLabels = { letf:'Leveraged ETF', ietf:'Inverse ETF', etf:'ETF', stock:'Stock' };
    html += `<div class="sym-info">`;
    html += `<div class="sym-info-name">${info.name}</div>`;
    html += `<div class="sym-info-tags">`;
    html += `<span class="sym-tag ${info.type}">${typeLabels[info.type]}</span>`;
    html += `<span class="sym-tag sector">${info.sector}</span>`;
    if (info.leverage > 1) {
      html += `<span class="sym-tag leverage">${info.leverage}x Leverage</span>`;
    }
    if (info.type === 'ietf') {
      html += `<span class="sym-tag direction-bear">Inverse</span>`;
    }
    html += `</div>`;
    html += `<div class="sym-info-desc">${info.desc}</div>`;
    if (info.underlying) {
      const dirWord = info.direction === 'bear' ? 'inversely to' : 'with';
      const leverageWord = info.leverage > 1 ? ` at ${info.leverage}x the daily move` : '';
      html += `<div class="sym-info-underlying">Derived from <strong>${info.underlying}</strong> — moves ${dirWord} ${info.underlying}${leverageWord}</div>`;
    }
    html += `</div>`;
  }

  html += `
      <div class="signal-row">
        <div class="signal-badge ${sig}">${signalLabel}</div>
        <div class="confidence"><strong>${confidence}%</strong> confidence ${signalNote}</div>
      </div>`;

  // Blockers
  if (blockers.length > 0) {
    blockers.forEach(b => {
      html += `<div class="blocker"><span class="blocker-icon">⚠</span>${b}</div>`;
    });
  }

  // Reasons
  html += `<div class="reasons">`;
  topReasons.forEach(r => {
    const iconClass = r.type === 'bull' ? 'bull' : 'bear';
    const icon = r.type === 'bull' ? '▲' : '▼';
    html += `<div class="reason"><span class="reason-icon ${iconClass}">${icon}</span>${r.text}</div>`;
  });
  neutralReasons.forEach(r => {
    html += `<div class="reason"><span class="reason-icon neutral">●</span>${r.text}</div>`;
  });
  html += `</div>`;

  // Metrics — new indicator set
  const vwapClass = !metrics.vwap ? 'neutral' : (Math.abs(metrics.priceVsVwap) > 1.2 ? 'bear' : metrics.priceVsVwap > 0.1 ? 'bull' : metrics.priceVsVwap < -0.1 ? 'bear' : 'neutral');
  const volClass = metrics.relVol > 1.3 ? 'bull' : metrics.relVol < 0.7 ? 'bear' : 'neutral';
  const volTrendClass = metrics.volTrend == null ? 'neutral' : (metrics.volTrend > 1.15 ? 'bull' : metrics.volTrend < 0.7 ? 'bear' : 'neutral');
  const macdClass = metrics.macdHist > 0 ? (metrics.macdHistRising ? 'bull' : 'neutral') : (metrics.macdHistRising ? 'bear' : 'neutral');
  const atrClass = metrics.atrUsedPct == null ? 'neutral' : (metrics.atrUsedPct < 50 ? 'bull' : metrics.atrUsedPct > 80 ? 'bear' : 'neutral');
  const rsiVal = metrics.intradayRsi || metrics.dailyRsi;
  const rsiClass = !rsiVal ? 'neutral' : (rsiVal >= 65 ? 'bear' : rsiVal <= 35 ? 'bull' : rsiVal >= 40 && rsiVal <= 58 ? 'bull' : 'neutral');
  const trendClass = metrics.trendBull >= 3 ? 'bull' : metrics.trendBull <= 1 ? 'bear' : 'neutral';
  const trendLabel = metrics.trendBull >= 4 ? '▲ Strong' : metrics.trendBull === 3 ? '▲ Mostly' : metrics.trendBull <= 0 ? '▼ Strong' : metrics.trendBull === 1 ? '▼ Mostly' : '— Mixed';

  // RSI display: show both if available
  let rsiDisplay = 'N/A';
  if (metrics.intradayRsi && metrics.dailyRsi) {
    rsiDisplay = `${metrics.intradayRsi.toFixed(0)} / ${metrics.dailyRsi.toFixed(0)}`;
  } else if (metrics.dailyRsi) {
    rsiDisplay = metrics.dailyRsi.toFixed(0);
  }

  html += `
      <div class="metrics">
        <div class="metric">
          <div class="metric-label">VWAP</div>
          <div class="metric-val ${vwapClass}">${metrics.vwap ? (metrics.priceVsVwap > 0 ? '+' : '') + metrics.priceVsVwap.toFixed(2) + '%' : 'N/A'}</div>
          <div class="tip">Where price is vs today's volume-weighted average price. Slightly above (0-0.7%) is good buying territory. Over 1.2% means stretched — that's chase territory where reversals happen. Works the same way below for shorts.</div>
        </div>
        <div class="metric">
          <div class="metric-label">Volume</div>
          <div class="metric-val ${volClass}">${metrics.relVol.toFixed(1)}x</div>
          <div class="tip">Today's volume vs 20-day average. Above 1.5x means real money is behind this move. Below 0.7x means the price action is unreliable — low volume moves get reversed easily.</div>
        </div>
        <div class="metric">
          <div class="metric-label">Vol Flow</div>
          <div class="metric-val ${volTrendClass}">${metrics.volTrend != null ? (metrics.volTrend > 1 ? '▲ ' : '▼ ') + metrics.volTrend.toFixed(2) + 'x' : 'N/A'}</div>
          <div class="tip">Are the last few 30-min bars getting more or less volume than the ones before? Rising = fresh money still coming in, the move has legs. Falling = buyers/sellers are done, you'd be the last one in.</div>
        </div>
        <div class="metric">
          <div class="metric-label">MACD</div>
          <div class="metric-val ${macdClass}">${metrics.macdHist > 0 ? '+' : ''}${metrics.macdHist.toFixed(3)} ${metrics.macdHistRising ? '▲' : '▼'}</div>
          <div class="tip">Momentum speed and direction. The number shows strength, the arrow shows if it's accelerating (▲) or decelerating (▼). Positive but slowing down is a red flag — the move looks strong but the engine is dying. That's where reversals start.</div>
        </div>
        <div class="metric">
          <div class="metric-label">Range Left</div>
          <div class="metric-val ${atrClass}">${metrics.atrUsedPct != null ? (100 - metrics.atrUsedPct).toFixed(0) + '%' : 'N/A'}</div>
          <div class="tip">How much of the typical daily range is still available. Based on 14-day ATR (average true range). If only 10-20% is left, the day's move is statistically over — even if direction is right, there's nowhere left to go.</div>
        </div>
        <div class="metric">
          <div class="metric-label">RSI</div>
          <div class="metric-val ${rsiClass}">${rsiDisplay}</div>
          <div class="tip">${metrics.intradayRsi ? 'Shows 30-min / daily RSI. ' : 'Daily RSI. '}Best entries are when both sit between 40-58 — momentum is building but not overheated. Above 65 on either means you're late. Above 75 means don't touch it. Below 30 means a potential bounce setup.</div>
        </div>
        <div class="metric">
          <div class="metric-label">Trend</div>
          <div class="metric-val ${trendClass}">${trendLabel}</div>
          <div class="tip">Combined read of EMA 9, EMA 21, SMA 20 direction, and their relative position. "Strong" means all four agree on direction. "Mixed" means the trend is unclear — signals in mixed trends are less reliable.</div>
        </div>
        <div class="metric">
          <div class="metric-label">Prev Day</div>
          <div class="metric-val ${price > metrics.prevDayHigh ? 'bull' : price < metrics.prevDayLow ? 'bear' : 'neutral'}">${price > metrics.prevDayHigh ? '▲ Above High' : price < metrics.prevDayLow ? '▼ Below Low' : '— In Range'}</div>
          <div class="tip">Whether price has broken above yesterday's high or below yesterday's low. These are levels that traders watch — breaking them with volume confirms a real move. Staying inside yesterday's range means no breakout yet.</div>
        </div>
      </div>`;

  // Sector reference
  if (sectorData) {
    const sDir = sectorData.change >= 0 ? 'up' : 'down';
    const sSign = sectorData.change >= 0 ? '+' : '';
    const confirms = (dayChange >= 0 && sectorData.change >= 0) || (dayChange < 0 && sectorData.change < 0);
    html += `
      <div class="sector-ref">
        <span class="dot ${sDir}"></span>
        Reference: ${sectorData.sym} ${sSign}${sectorData.change.toFixed(2)}%
        — ${confirms ? 'confirms' : 'does NOT confirm'} the move
      </div>`;
  }

  // Timestamp
  html += `<div class="timestamp">Updated ${new Date().toLocaleTimeString()}</div>`;

  html += `</div>`;
  return html;
}

function renderLoading(sym) {
  return `<div class="card" id="card-${sym}" draggable="true"><div class="card-head"><div class="card-sym">${sym}</div></div><div class="card-loading"><div class="spinner"></div>Analyzing...</div></div>`;
}

function renderError(sym, msg) {
  return `<div class="card" id="card-${sym}" draggable="true"><div class="card-head"><div class="card-sym">${sym}</div><div class="card-actions"><button class="card-refresh" onclick="refreshSymbol('${sym}',this)" title="Refresh">↻</button><button class="card-remove" onclick="removeSymbol('${sym}')">✕</button></div></div><div class="card-error">${msg}</div></div>`;
}

// ═══════════════════════════════════════════════════════════════
// WATCHLIST MANAGEMENT
// ═══════════════════════════════════════════════════════════════

function saveWatchlist() {
  localStorage.setItem('ts_watchlist', JSON.stringify(watchlist));
}

function addSymbol() {
  const input = document.getElementById('symInput');
  const sym = input.value.trim().toUpperCase();
  if (!sym) return;
  if (watchlist.includes(sym)) { input.value = ''; return; }
  watchlist.unshift(sym);
  saveWatchlist();
  input.value = '';
  analyzeAndRender(sym, 'top');
}

function removeSymbol(sym) {
  watchlist = watchlist.filter(s => s !== sym);
  saveWatchlist();
  const card = document.getElementById(`card-${sym}`);
  if (card) card.remove();
}

function refreshSymbol(sym, btnEl) {
  if (btnEl) btnEl.classList.add('spinning');
  analyzeAndRender(sym);
}

function clearAll() {
  watchlist = [];
  saveWatchlist();
  document.getElementById('grid').innerHTML = '';
}

function moveSymbol(sym, dir) {
  const idx = watchlist.indexOf(sym);
  if (idx < 0) return;
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= watchlist.length) return;
  // Swap in watchlist
  [watchlist[idx], watchlist[newIdx]] = [watchlist[newIdx], watchlist[idx]];
  saveWatchlist();
  // Swap cards in DOM
  const grid = document.getElementById('grid');
  const cards = [...grid.children];
  const cardA = document.getElementById(`card-${sym}`);
  const cardB = cards[newIdx];
  if (!cardA || !cardB || cardA === cardB) return;
  // Use insertBefore to swap
  if (dir === -1) {
    grid.insertBefore(cardA, cardB);
  } else {
    grid.insertBefore(cardB, cardA);
  }
}

// ── Custom Presets ──
function getCustomPresets() {
  return JSON.parse(localStorage.getItem('ts_custom_presets') || '{}');
}

function saveCustomPresetsToStorage(presets) {
  localStorage.setItem('ts_custom_presets', JSON.stringify(presets));
}

function saveCustomPreset() {
  const input = document.getElementById('presetNameInput');
  const name = input.value.trim();
  if (!name) return;
  if (watchlist.length === 0) return;
  const presets = getCustomPresets();
  const key = 'custom_' + name.toLowerCase().replace(/[^a-z0-9]/g, '_');
  presets[key] = { name, symbols: [...watchlist] };
  saveCustomPresetsToStorage(presets);
  input.value = '';
  renderCustomPresetButtons();
}

function deleteCustomPreset(key, e) {
  e.stopPropagation();
  const presets = getCustomPresets();
  delete presets[key];
  saveCustomPresetsToStorage(presets);
  renderCustomPresetButtons();
}

function loadCustomPreset(key) {
  const presets = getCustomPresets();
  const preset = presets[key];
  if (!preset) return;
  // Replace current list entirely with the saved preset
  watchlist = [...preset.symbols];
  saveWatchlist();
  renderAll();
}

function renderCustomPresetButtons() {
  const container = document.getElementById('customPresets');
  const presets = getCustomPresets();
  const keys = Object.keys(presets);
  if (keys.length === 0) { container.innerHTML = ''; return; }
  container.innerHTML = keys.map(key => {
    const p = presets[key];
    return `<button class="preset-btn custom" onclick="loadCustomPreset('${key}')">${p.name} (${p.symbols.length})<span class="preset-delete" onclick="deleteCustomPreset('${key}',event)" title="Delete preset">✕</span></button>`;
  }).join('');
}

// ── Drag and Drop ──
function initDragAndDrop() {
  const grid = document.getElementById('grid');
  let dragSym = null;

  grid.addEventListener('dragstart', e => {
    const card = e.target.closest('.card');
    if (!card) return;
    dragSym = card.id.replace('card-', '');
    card.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', dragSym);
  });

  grid.addEventListener('dragend', e => {
    const card = e.target.closest('.card');
    if (card) card.classList.remove('dragging');
    grid.querySelectorAll('.drag-over').forEach(c => c.classList.remove('drag-over'));
    dragSym = null;
  });

  grid.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const card = e.target.closest('.card');
    if (card && !card.classList.contains('dragging')) {
      grid.querySelectorAll('.drag-over').forEach(c => c.classList.remove('drag-over'));
      card.classList.add('drag-over');
    }
  });

  grid.addEventListener('dragleave', e => {
    const card = e.target.closest('.card');
    if (card) card.classList.remove('drag-over');
  });

  grid.addEventListener('drop', e => {
    e.preventDefault();
    grid.querySelectorAll('.drag-over').forEach(c => c.classList.remove('drag-over'));
    const targetCard = e.target.closest('.card');
    if (!targetCard || !dragSym) return;
    const targetSym = targetCard.id.replace('card-', '');
    if (targetSym === dragSym) return;

    const fromIdx = watchlist.indexOf(dragSym);
    const toIdx = watchlist.indexOf(targetSym);
    if (fromIdx < 0 || toIdx < 0) return;

    // Reorder watchlist
    watchlist.splice(fromIdx, 1);
    watchlist.splice(toIdx, 0, dragSym);
    saveWatchlist();

    // Reorder DOM
    const dragCard = document.getElementById(`card-${dragSym}`);
    if (fromIdx < toIdx) {
      targetCard.insertAdjacentElement('afterend', dragCard);
    } else {
      grid.insertBefore(dragCard, targetCard);
    }
  });
}

function loadPreset(name) {
  const syms = PRESETS[name];
  let added = 0;
  syms.forEach(s => {
    if (!watchlist.includes(s)) { watchlist.push(s); added++; }
  });
  if (added === 0) return; // all already in list
  saveWatchlist();
  renderAll();
}

async function analyzeAndRender(sym, position) {
  const grid = document.getElementById('grid');
  // Add loading card
  let existingCard = document.getElementById(`card-${sym}`);
  if (existingCard) {
    existingCard.outerHTML = renderLoading(sym);
  } else if (position === 'top') {
    grid.insertAdjacentHTML('afterbegin', renderLoading(sym));
  } else {
    grid.insertAdjacentHTML('beforeend', renderLoading(sym));
  }

  try {
    const [data, sectorData] = await Promise.all([
      analyzeSymbol(sym),
      getSectorSignal(sym)
    ]);

    // Apply sector confirmation as a core signal (weight 16 of 110)
    if (sectorData) {
      const sectorW = 16;
      const confirms = (data.dayChange >= 0 && sectorData.change >= 0) || (data.dayChange < 0 && sectorData.change < 0);
      const sectorStrength = Math.abs(sectorData.change);

      if (confirms && sectorStrength > 0.3) {
        // Sector confirms direction
        const boost = sectorStrength > 1.0 ? sectorW : sectorW * 0.6;
        data.totalScore += (data.dayChange >= 0 ? boost : -boost);
        data.signals.push({ text: `${sectorData.sym} confirms (${sectorData.change >= 0 ? '+' : ''}${sectorData.change.toFixed(2)}%) — broader market agrees`, type: data.dayChange >= 0 ? 'bull' : 'bear' });
      } else if (!confirms && sectorStrength > 0.3) {
        // Sector disagrees — this is a strong anti-signal
        const penalty = sectorStrength > 1.0 ? sectorW : sectorW * 0.6;
        data.totalScore += (data.dayChange >= 0 ? -penalty : penalty);
        data.signals.push({ text: `${sectorData.sym} NOT confirming (${sectorData.change >= 0 ? '+' : ''}${sectorData.change.toFixed(2)}%) — fighting the broader market`, type: 'neutral' });
      } else {
        data.signals.push({ text: `${sectorData.sym} flat (${sectorData.change >= 0 ? '+' : ''}${sectorData.change.toFixed(2)}%) — no clear signal from the index`, type: 'neutral' });
      }

      // Recalculate final signal with sector score included
      const fullMax = data.maxPossible + sectorW;
      const newNorm = (data.totalScore / fullMax) * 100;
      data.normalizedScore = newNorm;

      if (newNorm > 18 && data.blockers.length === 0) {
        data.signal = 'BUY';
        data.confidence = Math.min(95, Math.round(30 + newNorm * 0.65));
      } else if (newNorm < -18 && data.blockers.length === 0) {
        data.signal = 'SELL';
        data.confidence = Math.min(95, Math.round(30 + Math.abs(newNorm) * 0.65));
      } else {
        data.signal = 'WAIT';
        data.confidence = Math.round(40 + Math.abs(newNorm) * 0.3);
      }
    }

    const card = document.getElementById(`card-${sym}`);
    if (card) card.outerHTML = renderCard(data, sectorData);
  } catch(e) {
    const card = document.getElementById(`card-${sym}`);
    if (card) card.outerHTML = renderError(sym, `Could not analyze: ${e.message}`);
  }
}

let renderGeneration = 0;
async function renderAll() {
  const gen = ++renderGeneration;
  document.getElementById('grid').innerHTML = '';
  // Stagger fetches to avoid overwhelming proxies
  for (let i = 0; i < watchlist.length; i++) {
    if (gen !== renderGeneration) return; // cancelled by newer renderAll
    analyzeAndRender(watchlist[i]);
    if (i % 3 === 2) await new Promise(r => setTimeout(r, 800));
  }
}

function refreshAll() {
  renderAll();
}

// Tooltip positioning — runs on hover via event delegation
document.getElementById('grid').addEventListener('mouseenter', function(e) {
  const metric = e.target.closest('.metric');
  if (!metric) return;
  const tip = metric.querySelector('.tip');
  if (!tip) return;

  // Reset classes
  tip.className = 'tip';

  // Get positions
  const metricRect = metric.getBoundingClientRect();
  const tipWidth = 220;

  // Vertical: show above unless too close to top of viewport
  if (metricRect.top < 140) {
    tip.classList.add('pos-below');
  } else {
    tip.classList.add('pos-above');
  }

  // Horizontal: check if centered tip would clip viewport edges
  const centerX = metricRect.left + metricRect.width / 2;
  if (centerX - tipWidth / 2 < 8) {
    tip.classList.add('align-right');
  } else if (centerX + tipWidth / 2 > window.innerWidth - 8) {
    tip.classList.add('align-left');
  }
}, true);

apiInput.value = finnhubKey;
apiInput.addEventListener('change', () => {
  finnhubKey = apiInput.value.trim();
  localStorage.setItem('ts_finnhub', finnhubKey);
  document.getElementById('statusDot').classList.toggle('live', finnhubKey.length > 0);

if (finnhubKey) document.getElementById('statusDot').classList.add('live');

});

// Auto-refresh every 3 minutes
setInterval(() => {
  if (watchlist.length > 0 && document.visibilityState === 'visible') {
    renderAll();
  }
}, 180000);

// Boot
initDragAndDrop();
renderCustomPresetButtons();
if (watchlist.length > 0) {
  renderAll();
}
